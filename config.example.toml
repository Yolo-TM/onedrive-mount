[[remotes]]
name = "onedrive"            # must match rclone remote name
mount_point = "~/onedrive"
# type = "onedrive"
# poll_interval = "30s"
# enabled = true

[remotes.mount]
# vfs_cache_mode = "full"
# vfs_cache_max_age = "72h"
# vfs_cache_max_size = "20G"
# vfs_write_back = "5s"
# transfers = 8
# dir_cache_time = "15m"
# extra_flags = []

[[remotes.sync_rules]]
name = "Docs"
remote_path = "Files/Docs"
local_path = "~/Docs"
patterns = ["*.pdf"]
interval = "5m"
sync_strategy = "bidirectional"   # bidirectional | newest_wins | mirror_down | mirror_up
# enabled = false
#
# Strategy reference:
#   bidirectional  — sync both ways; on conflict, keep both (local renamed with .conflict- suffix)
#   newest_wins    — sync both ways; on conflict, newer mtime wins (older is overwritten)
#   mirror_down    — one-way remote → local; local changes are DELETED
#   mirror_up      — one-way local → remote; remote changes are DELETED

[log]
# file = "~/.local/share/onedrive-mount/daemon.log"
# level = "INFO"   # DEBUG | INFO | NOTICE | ERROR
# NOTE: log settings require a daemon restart to take effect.
# They are not reloaded on config change like mount/sync settings are.
