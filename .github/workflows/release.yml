name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # NixOS: dynamically linked, rpath-patched — for NixOS users and `nix run`
  build-nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build
        run: nix build .#default

      - name: Collect artifacts
        run: |
          mkdir -p dist pkg/bin pkg/share/applications pkg/share/icons/hicolor/scalable/apps
          # individual binaries
          cp result/bin/onedrive-mount  dist/onedrive-mount-x86_64-linux-nix
          cp result/bin/onedrive-mountd dist/onedrive-mountd-x86_64-linux-nix
          # bundle: binaries + .desktop + icon in one tarball for NixOS fetchTarball installs
          cp result/bin/onedrive-mount  pkg/bin/onedrive-mount
          cp result/bin/onedrive-mountd pkg/bin/onedrive-mountd
          cp assets/onedrive-mount.desktop pkg/share/applications/onedrive-mount.desktop
          cp assets/icon.svg pkg/share/icons/hicolor/scalable/apps/onedrive-mount.svg
          cp nix/default.nix pkg/default.nix
          tar -czf dist/onedrive-mount-x86_64-linux-nix.tar.gz -C pkg .

      - uses: actions/upload-artifact@v4
        with:
          name: nix
          path: dist/

  # glibc dynamic: GUI + daemon linked against system libs — works on Debian, Fedora, Arch, etc.
  build-glibc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install GUI runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev libxcb-render0-dev \
            libxkbcommon-dev libgl1-mesa-dev pkg-config

      - name: Build daemon
        run: cargo build --release --bin onedrive-mountd --features daemon

      - name: Build GUI
        run: cargo build --release --bin onedrive-mount --features gui

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/release/onedrive-mount  dist/onedrive-mount-x86_64-linux
          cp target/release/onedrive-mountd dist/onedrive-mountd-x86_64-linux

      - uses: actions/upload-artifact@v4
        with:
          name: glibc
          path: dist/

  # musl static: daemon only — no dependencies, runs on any Linux
  build-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build daemon (static)
        run: cargo build --release --bin onedrive-mountd --features daemon --target x86_64-unknown-linux-musl

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/onedrive-mountd dist/onedrive-mountd-x86_64-linux-musl

      - uses: actions/upload-artifact@v4
        with:
          name: musl
          path: dist/

  release:
    needs: [build-nix, build-glibc, build-musl]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
